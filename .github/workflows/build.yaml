name: Build EXE
on: push
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install pyinstaller requests fake_useragent
      - run: pyinstaller --onefile --name bomber src/main.py
      - uses: actions/upload-artifact@v4
        with:
          name: bomber-exe
          path: dist/bomber.exe